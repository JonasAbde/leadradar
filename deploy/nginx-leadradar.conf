# LeadRadar Nginx Configuration
# Place in /etc/nginx/sites-available/leadradar and symlink to sites-enabled
# Requires: sudo apt install nginx certbot python3-certbot-nginx

upstream leadradar {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name _;  # Replace with your domain: leadradar.dk www.leadradar.dk

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static files
    location /static {
        alias /home/ubuntu/leadradar/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy to uvicorn
    location / {
        proxy_pass http://leadradar;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Webhook endpoint (Stripe) — no rate limit via nginx
    location /api/stripe/webhook {
        proxy_pass http://leadradar;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}

