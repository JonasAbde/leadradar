<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — LeadRadar</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">📡</div>
                <span class="auth-logo-text">LeadRadar</span>
            </div>
            <h1 class="auth-heading">Reset your password</h1>
            <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

            {% if msg %}
            <div class="auth-error" id="msg-flash">{{ msg }}</div>
            {% endif %}
            {% if success %}
            <div class="auth-success" style="background:#dcfce7;color:#166534;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px;">
                Check your email for a reset link.
            </div>
            {% endif %}

            <form class="auth-form" action="/api/forgot-password" method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="input-group">
                    <label for="email">Email address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="you@company.com" required />
                    </div>
                </div>
                <button type="submit" class="auth-submit">Send Reset Link</button>
            </form>

            <div class="auth-divider"></div>
            <div class="auth-footer">
                <a href="/login">Back to login</a>
            </div>
        </div>
    </div>
    <script>
        (function() {
            const flash = document.getElementById('msg-flash');
            if (flash) {
                setTimeout(function() {
                    flash.style.transition = 'opacity 400ms ease';
                    flash.style.opacity = '0';
                    setTimeout(function() { flash.remove(); }, 400);
                }, 6000);
            }
        })();
    </script>
</body>
</html>
