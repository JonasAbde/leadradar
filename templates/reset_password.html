<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — LeadRadar</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">📡</div>
                <span class="auth-logo-text">LeadRadar</span>
            </div>
            <h1 class="auth-heading">Create new password</h1>
            <p class="auth-subtitle">Enter a new password for your account</p>

            {% if error %}
            <div class="auth-error" id="msg-flash">{{ error }}</div>
            {% endif %}

            {% if not invalid %}
            <form class="auth-form" id="reset-form" action="/api/reset-password" method="post">
                <input type="hidden" name="token" value="{{ token }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="input-group">
                    <label for="password">New password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Min. 3 characters" required minlength="3">
                    </div>
                </div>
                <button type="submit" class="auth-submit" id="submit-btn">Update Password</button>
            </form>
            {% endif %}

            <div class="auth-divider"></div>
            <div class="auth-footer">
                <a href="/login">Back to login</a>
            </div>
        </div>
    </div>
    <script>
        (function() {
            const form = document.getElementById('reset-form');
            const btn = document.getElementById('submit-btn');
            if (form && btn) {
                form.addEventListener('submit', function() {
                    btn.disabled = true;
                    btn.textContent = 'Updating...';
                });
            }
            const flash = document.getElementById('msg-flash');
            if (flash) {
                setTimeout(function() {
                    flash.style.transition = 'opacity 400ms ease';
                    flash.style.opacity = '0';
                    setTimeout(function() { flash.remove(); }, 400);
                }, 6000);
            }
        })();
    </script>
</body>
</html>
