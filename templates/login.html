<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — LeadRadar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; padding: 48px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        p { color: #64748b; margin-bottom: 24px; }
        input { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 12px; font-size: 15px; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: #2563eb; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        .link { text-align: center; margin-top: 16px; font-size: 14px; color: #64748b; }
        .link a { color: #2563eb; text-decoration: none; }
        .logo { text-align: center; margin-bottom: 24px; font-size: 32px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">📡</div>
        <h1>Welcome back</h1>
        <p>Sign in to your LeadRadar account</p>
        <form action="/api/login" method="post">
            <input type="email" name="email" placeholder="you@company.dk" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
        <div class="link">
            Don't have an account? <a href="/register">Get started free</a>
        </div>
    </div>
</body>
</html>
