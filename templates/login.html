<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — LeadRadar</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="auth-logo-icon">📡</div>
                <span class="auth-logo-text">LeadRadar</span>
            </div>

            <!-- Heading -->
            <h1 class="auth-heading">Welcome back</h1>
            <p class="auth-subtitle">Sign in to your LeadRadar account</p>

            <!-- Error flash -->
            {% if msg %}
            <div class="auth-error" id="error-flash">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"
                        opacity="0.6" />
                    <path
                        d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708" />
                </svg>
                {{ msg }}
            </div>
            {% endif %}

            <!-- Login Form -->
            <form class="auth-form" id="login-form" action="/api/login" method="post" novalidate>
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="input-group">
                    <label for="email">Email address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email"
                            required />
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter your password"
                            autocomplete="current-password" required />
                        <button type="button" class="password-toggle" id="toggle-password" aria-label="Toggle password visibility" tabindex="-1">
                            Show
                        </button>
                    </div>
                </div>

                <button type="submit" class="auth-submit" id="login-btn">Login</button>
            </form>

            <div class="auth-divider"></div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="/register">Register</a></p>
                <p style="margin-top:8px;"><a href="/forgot-password">Forgot password?</a></p>
            </div>
        </div>
    </div>

    <script>
        // Show / Hide Password
        (function () {
            const pwInput = document.getElementById('password');
            const toggle = document.getElementById('toggle-password');
            if (pwInput && toggle) {
                toggle.addEventListener('click', function () {
                    const show = pwInput.type === 'password';
                    pwInput.type = show ? 'text' : 'password';
                    toggle.textContent = show ? 'Hide' : 'Show';
                });
            }
        })();

        // Client-side validation
        (function () {
            const form = document.getElementById('login-form');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const submitBtn = document.getElementById('login-btn');

            form.addEventListener('submit', function (e) {
                let valid = true;
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                // Clear previous error states
                emailInput.classList.remove('error');
                passwordInput.classList.remove('error');

                if (!email || !/^[^\s@]+@[^\s@]+\.[^\s]+$/.test(email)) {
                    emailInput.classList.add('error');
                    valid = false;
                }

                if (!password) {
                    passwordInput.classList.add('error');
                    valid = false;
                }

                if (!valid) {
                    e.preventDefault();
                    return;
                }

                // Show loading state
                submitBtn.disabled = true;
                submitBtn.textContent = 'Signing in…';
            });

            // Remove error on input
            emailInput.addEventListener('input', function () {
                emailInput.classList.remove('error');
            });
            passwordInput.addEventListener('input', function () {
                passwordInput.classList.remove('error');
            });
        })();

        // Auto-dismiss flash message
        (function () {
            const flash = document.getElementById('error-flash');
            if (flash) {
                setTimeout(function () {
                    flash.style.transition = 'opacity 400ms ease';
                    flash.style.opacity = '0';
                    setTimeout(function () { flash.remove(); }, 400);
                }, 6000);
            }
        })();
    </script>
</body>

</html>
